name: Deploy / Sync htdocs files

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      direction:
        description: "sync direction"
        required: true
        default: "pull-from-server"
        type: choice
        options:
          - pull-from-server
          - push-changed-files

jobs:
  ftp-push-changed:
    if: github.event_name == 'push' || github.event.inputs.direction == 'push-changed-files'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Upload only changed files
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          REMOTE_DIR: /htdocs
        run: |
          echo "Changed files:"
          git diff --name-status HEAD^ HEAD

          git diff --name-status HEAD^ HEAD | while IFS=$'\t' read -r status file; do
            [ -z "$file" ] && continue

            case "$file" in
              .github/*|.GitHub/*|.git/*|node_modules/*)
                echo "Skipping $file"
                continue
                ;;
            esac

            remote_path="$REMOTE_DIR/$file"
            remote_dir="$(dirname "$remote_path")"

            if [ "$status" = "D" ]; then
              echo "Deleting remote file: $remote_path"
              curl --silent --show-error --fail \
                --user "$FTP_USERNAME:$FTP_PASSWORD" \
                --ftp-create-dirs \
                -Q "-DELE $remote_path" \
                "ftp://$FTP_SERVER/" || true
            else
              echo "Uploading: $file -> $remote_path"
              curl --silent --show-error --fail \
                --user "$FTP_USERNAME:$FTP_PASSWORD" \
                --ftp-create-dirs \
                -T "$file" \
                "ftp://$FTP_SERVER$remote_dir/"
            fi
          done

  ftp-pull-all:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.direction == 'pull-from-server'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Download all files from /htdocs
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_SERVER" <<'EOF'
          set ssl:verify-certificate no
          mirror --verbose \
            --delete \
            --exclude-glob .git/ \
            --exclude-glob .github/ \
            --exclude-glob .GitHub/ \
            /htdocs ./
          bye
          EOF

      - name: Commit synced files
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes detected after sync"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Sync files from FTP /htdocs"

      - name: Push commit
        run: |
          if git rev-parse --verify HEAD >/dev/null 2>&1; then
            git push
          fi
